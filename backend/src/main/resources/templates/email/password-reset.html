<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; background: #f5f7fb; margin: 0; padding: 20px; color: #1e293b; }
    .container { background: #ffffff; padding: 30px; border-radius: 8px; max-width: 600px; margin: auto; box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08); }
    .button { background: #4f46e5; color: #ffffff !important; padding: 12px 20px; text-decoration: none; border-radius: 6px; display: inline-block; margin-top: 20px; font-weight: 600; }
    .footer { margin-top: 30px; font-size: 12px; color: #888888; }
    p { line-height: 1.5; }
  </style>
</head>
<body>
<div class="container">
  <h2>Reset Your Password</h2>
  <p>You requested to reset your MentorLink password.</p>
  <p>Click the button below to reset your password:</p>
  <p><a class="button" th:href="${resetLink}">Reset Password</a></p>
  <p>This link will expire in 15 minutes.</p>
  <p>If you did not request this, you can ignore this email.</p>
  <div class="footer">MentorLink</div>
</div>
</body>
</html>
