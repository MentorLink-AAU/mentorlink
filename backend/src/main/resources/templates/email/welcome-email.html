<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome to MentorLink</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; background: #f5f7fb; margin: 0; padding: 20px; color: #1e293b; }
    .container { background: #ffffff; padding: 30px; border-radius: 8px; max-width: 600px; margin: auto; box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08); }
    .title { color: #4f46e5; }
    p { line-height: 1.5; }
  </style>
</head>
<body>
<div class="container">
  <h2 class="title">Welcome to MentorLink</h2>
  <p>Your account has been successfully created.</p>
  <p>You registered as: <b th:text="${role}">ROLE</b></p>
  <p>You can now log in and start using the MentorLink portal.</p>
  <p>We wish you a great experience collaborating with mentors and project groups.</p>
  <p>Best regards,<br/>MentorLink Team</p>
</div>
</body>
</html>
