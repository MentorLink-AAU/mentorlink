<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mentor Request Update</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; background: #f5f7fb; margin: 0; padding: 20px; color: #1e293b; }
    .container { background: #ffffff; padding: 30px; border-radius: 8px; max-width: 600px; margin: auto; box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08); }
    .status { font-weight: bold; color: #4f46e5; }
    p { line-height: 1.5; }
  </style>
</head>
<body>
<div class="container">
  <h2>Mentor Request Update</h2>
  <p>Your mentorship request for the project:</p>
  <p><b th:text="${projectTitle}">Project</b></p>
  <p>Status: <span class="status" th:text="${status}">Status</span></p>
  <p>Please log in to MentorLink for more details.</p>
  <p>MentorLink</p>
</div>
</body>
</html>
